<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayan ng Balaoan Video Portal</title>
    <link rel="stylesheet" href="style.css">
    
    <script>
        // REDIRECT LOGIC: If they've already picked, don't let them stay on this page
        
        
        if (sessionStorage.getItem('hasChosen') === 'true') {
            window.location.replace(sessionStorage.getItem('videoURL'));
        }

        

        function selectVideo(url) {
            // Save the choice so the browser remembers it for this session
            sessionStorage.setItem('hasChosen', 'true');
            sessionStorage.setItem('videoURL', url);
            
            // Redirect using replace so the index isn't kept in the history stack
            window.location.replace(url);
        }
    </script>
</head>
